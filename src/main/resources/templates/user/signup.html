<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenLink 회원가입</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito+Sans:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/greenlink/theme-portal.css">
</head>
<body>
<div class="gl-shell">
    <div class="gl-auth-card gl-card gl-fade" style="width:min(720px, calc(100vw - 30px));">
        <div class="gl-card-head">
            <div class="gl-brand" style="font-size:42px;"><div class="gl-brand-mark" style="width:56px;height:56px;">🌿</div><span>GreenLink</span></div>
            <a href="/home" class="gl-sub">대시보드 보기</a>
        </div>
        <h2 class="gl-title" style="margin-top:10px;">회원가입</h2>
        <p class="gl-sub">가입 후 바로 식물 대시보드를 사용할 수 있습니다.</p>

        <form class="gl-form" onsubmit="event.preventDefault(); signup();">
            <div class="gl-row-2">
                <div>
                    <label class="gl-sub" for="username">아이디</label>
                    <input id="username" placeholder="4~20자 영문/숫자/_">
                </div>
                <div>
                    <label class="gl-sub" for="nickname">닉네임</label>
                    <input id="nickname" placeholder="1~20자">
                </div>
            </div>

            <div class="gl-row-2">
                <div>
                    <label class="gl-sub" for="email">이메일</label>
                    <input id="email" type="email" placeholder="you@example.com">
                </div>
                <div>
                    <label class="gl-sub" for="password">비밀번호</label>
                    <input id="password" type="password" placeholder="8~64자">
                </div>
            </div>

            <div class="gl-row-2">
                <div>
                    <label class="gl-sub" for="phoneNumber">전화번호 (선택)</label>
                    <input id="phoneNumber" placeholder="010-1234-5678">
                </div>
                <div>
                    <label class="gl-sub" for="address">주소 (선택)</label>
                    <input id="address" placeholder="서울시 ...">
                </div>
            </div>

            <button class="gl-btn" type="submit">회원가입</button>
        </form>

        <div id="status" class="gl-sub" style="margin-top:12px;"></div>
        <div class="gl-sub" style="margin-top:14px;">이미 계정이 있나요? <a href="/user/login">로그인</a></div>
    </div>
</div>

<script>
async function signup() {
    const status = document.getElementById('status');
    const payload = {
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value.trim(),
        nickname: document.getElementById('nickname').value.trim(),
        phoneNumber: document.getElementById('phoneNumber').value.trim() || null,
        address: document.getElementById('address').value.trim() || null
    };

    if (!payload.username || !payload.email || !payload.password || !payload.nickname) {
        status.textContent = '필수 항목(아이디/이메일/비밀번호/닉네임)을 입력해 주세요.';
        return;
    }

    status.textContent = '가입 요청 중...';

    try {
        const res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const json = await res.json();

        if (!json.success) {
            const details = json.error?.details?.fieldErrors;
            if (Array.isArray(details) && details.length) {
                throw new Error(details[0].message || json.error?.message || '가입 실패');
            }
            throw new Error(json.error?.message || '가입 실패');
        }

        status.textContent = '회원가입 성공. 로그인 페이지로 이동합니다.';
        setTimeout(() => location.href = '/user/login', 350);
    } catch (e) {
        status.textContent = e.message;
    }
}
</script>
</body>
</html>
