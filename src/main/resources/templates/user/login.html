<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenLink 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito+Sans:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/greenlink/theme-portal.css">
</head>
<body>
<div class="gl-shell">
    <div class="gl-auth-card gl-card gl-fade">
        <div class="gl-card-head">
            <div class="gl-brand" style="font-size:42px;"><div class="gl-brand-mark" style="width:56px;height:56px;">🌿</div><span>GreenLink</span></div>
            <a href="/home" class="gl-sub">대시보드 보기</a>
        </div>
        <h2 class="gl-title" style="margin-top:10px;">로그인</h2>
        <p class="gl-sub">내 식물, 퀘스트, 인벤토리를 확인하려면 로그인하세요.</p>

        <form class="gl-form" onsubmit="event.preventDefault(); login();">
            <div>
                <label class="gl-sub" for="loginId">아이디 또는 이메일</label>
                <input id="loginId" autocomplete="username" placeholder="greenlink_user">
            </div>
            <div>
                <label class="gl-sub" for="password">비밀번호</label>
                <input id="password" type="password" autocomplete="current-password" placeholder="8자 이상">
            </div>
            <button class="gl-btn" type="submit">로그인</button>
        </form>

        <div id="status" class="gl-sub" style="margin-top:12px;"></div>
        <div class="gl-sub" style="margin-top:14px;">계정이 없나요? <a href="/user/signup">회원가입</a></div>
    </div>
</div>

<script>
async function login() {
    const status = document.getElementById('status');
    const loginId = document.getElementById('loginId').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!loginId || !password) {
        status.textContent = '아이디와 비밀번호를 입력해 주세요.';
        return;
    }

    status.textContent = '로그인 중...';
    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({loginId, password})
        });
        const json = await res.json();
        if (!json.success) {
            throw new Error(json.error?.message || '로그인에 실패했습니다.');
        }

        localStorage.setItem('Authorization', `Bearer ${json.data.accessToken}`);
        status.textContent = '로그인 성공. 대시보드로 이동합니다.';
        setTimeout(() => location.href = '/home', 280);
    } catch (e) {
        status.textContent = e.message;
    }
}
</script>
</body>
</html>
